<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bgm192" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Background (full bleed - no rounded corners, OS handles masking) -->
  <rect width="192" height="192" fill="url(#bgm192)"/>

  <!-- Safe zone: center 80% = 153.6x153.6, so 19.2px margin each side -->
  <!-- Scale content to 0.75 and center at 96,96 to stay well within safe zone -->
  <g transform="translate(96, 96) scale(0.75) translate(-96, -96)">
    <!-- Wrench (behind plane, rotated 45deg) -->
    <g transform="translate(96, 80) rotate(45)">
      <rect x="-3.5" y="-48" width="7" height="96" rx="3.5" fill="#475569"/>
      <path d="M-11,-48 Q-11,-60 -5,-64 L-2,-48Z" fill="#475569"/>
      <path d="M11,-48 Q11,-60 5,-64 L2,-48Z" fill="#475569"/>
      <circle cx="0" cy="52" r="12" fill="#475569"/>
      <circle cx="0" cy="52" r="6" fill="#1e293b"/>
    </g>

    <!-- Airplane -->
    <g transform="translate(96, 78)">
      <path d="
        M0,-54
        C3,-50 5,-40 5,-20
        L5,30
        C5,36 3,40 0,44
        C-3,40 -5,36 -5,30
        L-5,-20
        C-5,-40 -3,-50 0,-54
        Z
      " fill="white"/>

      <path d="
        M-5,-2
        L-56,14
        C-58,15 -58,19 -56,19
        L-5,8
        Z
      " fill="white"/>

      <path d="
        M5,-2
        L56,14
        C58,15 58,19 56,19
        L5,8
        Z
      " fill="white"/>

      <path d="
        M-5,28
        L-24,22
        C-26,21 -26,25 -24,26
        L-5,34
        Z
      " fill="white"/>

      <path d="
        M5,28
        L24,22
        C26,21 26,25 24,26
        L5,34
        Z
      " fill="white"/>

      <path d="M0,20 L0,12 L8,16 L3,24Z" fill="rgba(255,255,255,0.8)"/>

      <ellipse cx="0" cy="-38" rx="2.5" ry="5" fill="#3b82f6" opacity="0.7"/>

      <ellipse cx="-24" cy="10" rx="3.5" ry="7" fill="rgba(255,255,255,0.85)"/>
      <ellipse cx="24" cy="10" rx="3.5" ry="7" fill="rgba(255,255,255,0.85)"/>
    </g>

    <!-- CVG text -->
    <text x="96" y="155" text-anchor="middle" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-weight="800" font-size="17" fill="#cbd5e1" letter-spacing="4">CVG</text>

    <!-- Accent bar -->
    <rect x="56" y="162" width="80" height="2.5" rx="1.25" fill="#3b82f6" opacity="0.5"/>
  </g>
